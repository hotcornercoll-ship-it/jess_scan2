<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SlabLink - Premium Card Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background-color: #0b0f19;
      color: #f3f4f6;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .custom-shadow {
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
    }
    .glassmorphism {
      background: rgba(17, 24, 39, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .scanner-laser {
      background: linear-gradient(to bottom, rgba(59, 130, 246, 0) 0%, rgba(59, 130, 246, 0.8) 50%, rgba(59, 130, 246, 0) 100%);
      animation: scan 3s ease-in-out infinite;
    }
    @keyframes scan {
      0%, 100% { top: 0%; }
      50% { top: 100%; }
    }
  </style>
</head>
<body class="safe-bottom">

  <div class="max-w-md mx-auto min-h-screen flex flex-col justify-between p-4 relative">
    
    <header class="flex justify-between items-center py-2 px-1 z-10">
      <div class="flex items-center space-x-2">
        <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg shadow-blue-500/20 text-white font-bold text-lg">
          🗂️
        </div>
        <div>
          <h1 class="text-xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400 italic">SLABLINK</h1>
          <p class="text-[9px] text-gray-500 uppercase tracking-widest font-bold">Portfolio Engine</p>
        </div>
      </div>
      
      <button onclick="toggleSettings(true)" class="px-4 py-2 bg-blue-900/40 rounded-xl hover:bg-gray-800 transition border border-blue-500/30 text-blue-400 font-bold text-xs uppercase tracking-wider">
        ⚙️ Setup
      </button>
    </header>

    <main class="flex-grow flex flex-col justify-center my-4 space-y-4">
      
      <div class="relative w-full aspect-square bg-gray-950 rounded-3xl overflow-hidden border border-gray-800/60 custom-shadow">
        <video id="video" autoplay playsinline muted class="w-full h-full object-cover"></video>
        <canvas id="canvas" class="hidden"></canvas>
        
        <div id="laser" class="hidden absolute left-0 w-full h-8 scanner-laser pointer-events-none"></div>

        <div class="absolute inset-8 border border-white/20 rounded-2xl pointer-events-none flex items-center justify-center">
          <div class="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-blue-500 rounded-tl-lg"></div>
          <div class="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-blue-500 rounded-tr-lg"></div>
          <div class="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-blue-500 rounded-bl-lg"></div>
          <div class="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-blue-500 rounded-br-lg"></div>
          
          <span id="guide-text" class="text-white/40 text-[10px] font-bold uppercase tracking-widest text-center px-4 bg-black/40 py-2 rounded-lg backdrop-blur-sm">
            Align Slab Label Here
          </span>
        </div>

        <div class="absolute bottom-4 left-1/2 transform -translate-x-1/2 flex items-center space-x-6 z-10">
          <button id="shutter" onclick="captureCard()" class="bg-white/95 active:scale-90 transition p-1.5 rounded-full shadow-2xl border-4 border-blue-500">
            <div class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center text-white text-xl font-bold">
              📷
            </div>
          </button>
        </div>
      </div>

      <div class="glassmorphism rounded-2xl p-4 space-y-3">
        <div class="flex p-1 bg-gray-950 rounded-xl border border-gray-800/60">
          <button id="type-graded" onclick="setCardType('graded')" class="flex-1 py-2 text-xs font-black rounded-lg transition-all bg-blue-600 text-white">
            GRADED SLAB
          </button>
          <button id="type-raw" onclick="setCardType('raw')" class="flex-1 py-2 text-xs font-black rounded-lg transition-all text-gray-400">
            RAW CARD
          </button>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="relative">
            <span class="absolute left-3 top-7.5 text-gray-500 text-xs">$</span>
            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Price Paid</label>
            <input type="number" id="price-paid" class="w-full bg-gray-950 border border-gray-800 focus:border-blue-500 rounded-xl p-3 pl-6 text-sm outline-none text-white transition" placeholder="0.00">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1 ml-1">Purchase Source</label>
            <select id="source" class="w-full bg-gray-950 border border-gray-800 focus:border-blue-500 rounded-xl p-3 text-sm outline-none text-white transition appearance-none">
              <option value="eBay">eBay</option>
              <option value="Card Show">Card Show</option>
              <option value="LCS">Local Shop (LCS)</option>
              <option value="Whatnot">Whatnot</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
      </div>

    </main>

    <footer class="text-center py-2">
      <div id="status-card" class="inline-flex items-center space-x-2 bg-gray-900/60 px-4 py-2.5 rounded-full border border-gray-800/40">
        <div id="status-indicator" class="w-2 h-2 bg-blue-500 rounded-full"></div>
        <p id="status-text" class="text-xs font-bold text-gray-400 uppercase tracking-wider">Ready to scan...</p>
      </div>
    </footer>

  </div>

  <div id="settings-drawer" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 transition-opacity duration-300 opacity-0 pointer-events-none">
    <div class="absolute bottom-0 left-0 right-0 max-w-md mx-auto bg-[#0d1220] rounded-t-3xl border-t border-gray-800 p-6 space-y-6 transform translate-y-full transition-transform duration-300">
      <div class="flex justify-between items-center">
        <h2 class="text-lg font-black tracking-wide text-white uppercase mercantile italic">⚙️ Credentials</h2>
        <button onclick="toggleSettings(false)" class="text-gray-500 hover:text-white p-2 text-xl font-bold">
          ✕
        </button>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-[11px] font-black text-blue-400 uppercase tracking-wider mb-1.5">Gemini API Key</label>
          <input type="password" id="api-key-input" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-sm outline-none text-white focus:border-blue-500 transition" placeholder="Paste AI Studio Key here...">
          <p class="text-[10px] text-gray-500 mt-1">Get a free key from <a href="https://aistudio.google.com/" target="_blank" class="text-blue-500 underline">Google AI Studio</a>.</p>
        </div>

        <div>
          <label class="block text-[11px] font-black text-blue-400 uppercase tracking-wider mb-1.5">Google Sheet Web App URL</label>
          <input type="url" id="sheet-url-input" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-sm outline-none text-white focus:border-blue-500 transition" placeholder="Paste deployed Web App URL here...">
          <p class="text-[10px] text-gray-500 mt-1">The URL generated when deploying your Google Script backend.</p>
        </div>
      </div>

      <button onclick="saveSettings()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl text-xs uppercase tracking-widest shadow-lg active:scale-95 transition-all">
        Save Setup Connection
      </button>
    </div>
  </div>

  <div id="preview-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-[#0d1220] w-full max-w-sm rounded-3xl border border-gray-800/80 p-6 space-y-5 shadow-2xl relative overflow-hidden">
      
      <div class="text-center">
        <span class="px-3 py-1 bg-blue-900/50 border border-blue-500/30 text-blue-400 text-[10px] font-black rounded-full uppercase tracking-widest">AI Detection Results</span>
        <h3 class="text-lg font-black text-white tracking-tight mt-2">Confirm Card Details</h3>
      </div>

      <div class="space-y-3 max-h-80 overflow-y-auto pr-1">
        <div>
          <label class="block text-[10px] font-bold text-gray-500 uppercase">Player Name</label>
          <input type="text" id="edit-player" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none text-white focus:border-blue-500">
        </div>
        
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase">Year</label>
            <input type="text" id="edit-year" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none text-white focus:border-blue-500">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase">Set/Brand</label>
            <input type="text" id="edit-set" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none text-white focus:border-blue-500">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase">Grade/Condition</label>
            <input type="text" id="edit-grade" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none text-white focus:border-blue-500">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase">Cert #</label>
            <input type="text" id="edit-cert" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none text-white focus:border-blue-500">
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase">Market Value ($)</label>
            <input type="text" id="edit-market" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none text-white focus:border-blue-500">
          </div>
          <div>
            <label class="block text-[10px] font-bold text-gray-500 uppercase">Price Paid ($)</label>
            <input type="text" id="edit-price" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-2.5 text-sm outline-none text-white focus:border-blue-500">
          </div>
        </div>
      </div>

      <div class="flex space-x-3 pt-2 border-t border-gray-900">
        <button onclick="closePreviewModal()" class="flex-1 py-3 bg-gray-900 border border-gray-800 text-gray-400 font-bold rounded-xl text-xs uppercase tracking-wider hover:text-white">
          Discard
        </button>
        <button onclick="sendToGoogleSheets()" class="flex-1 py-3 bg-blue-600 text-white font-black rounded-xl text-xs uppercase tracking-wider shadow-lg shadow-blue-500/20">
          Send to Sheet
        </button>
      </div>

    </div>
  </div>

  <div id="notification" class="fixed top-4 left-4 right-4 max-w-md mx-auto z-50 transform -translate-y-24 transition-transform duration-300 ease-out">
    <div id="notification-bg" class="bg-gray-900 border border-gray-800 rounded-2xl p-4 shadow-2xl flex items-center space-x-3">
      <div id="notification-icon" class="w-10 h-10 rounded-xl flex items-center justify-center text-lg"></div>
      <div>
        <p id="notification-title" class="text-xs font-black uppercase tracking-wider text-white"></p>
        <p id="notification-desc" class="text-[11px] text-gray-400 font-medium"></p>
      </div>
    </div>
  </div>

  <script>
    let currentCardType = 'graded';
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const laser = document.getElementById('laser');
    const statusText = document.getElementById('status-text');
    const statusIndicator = document.getElementById('status-indicator');
    
    let config = {
      geminiApiKey: localStorage.getItem('geminiApiKey') || '',
      sheetAppUrl: localStorage.getItem('sheetAppUrl') || ''
    };

    document.getElementById('api-key-input').value = config.geminiApiKey;
    document.getElementById('sheet-url-input').value = config.sheetAppUrl;

    window.onload = () => {
      startCamera();
      if (!config.geminiApiKey || !config.sheetAppUrl) {
        showNotification('Setup Required', 'Configure credentials in Settings panel.', 'warning');
        setTimeout(() => toggleSettings(true), 1200);
      }
    };

    async function startCamera() {
      updateStatus('Accessing Camera...', 'blue');
      try {
        if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); }
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 1024, height: 1024 }, audio: false });
        video.srcObject = stream;
        updateStatus('Ready to catalog', 'green');
      } catch (err) {
        showNotification('Camera Error', 'Could not access camera. Check device permissions.', 'error');
        updateStatus('Camera Blocked', 'red');
      }
    }

    function setCardType(type) {
      currentCardType = type;
      document.getElementById('type-graded').className = type === 'graded' ? "flex-1 py-2 text-xs font-black rounded-lg bg-blue-600 text-white" : "flex-1 py-2 text-xs font-black rounded-lg text-gray-400";
      document.getElementById('type-raw').className = type === 'raw' ? "flex-1 py-2 text-xs font-black rounded-lg bg-blue-600 text-white" : "flex-1 py-2 text-xs font-black rounded-lg text-gray-400";
      document.getElementById('guide-text').innerText = type === 'graded' ? "Align Slab Label Here" : "Align Raw Card in Box";
    }

    function toggleSettings(open) {
      const drawer = document.getElementById('settings-drawer');
      if (open) {
        drawer.classList.remove('opacity-0', 'pointer-events-none');
        drawer.firstElementChild.classList.remove('translate-y-full');
      } else {
        drawer.classList.add('opacity-0', 'pointer-events-none');
        drawer.firstElementChild.classList.add('translate-y-full');
      }
    }

    function saveSettings() {
      config.geminiApiKey = document.getElementById('api-key-input').value.trim();
      config.sheetAppUrl = document.getElementById('sheet-url-input').value.trim();
      localStorage.setItem('geminiApiKey', config.geminiApiKey);
      localStorage.setItem('sheetAppUrl', config.sheetAppUrl);
      toggleSettings(false);
      showNotification('Saved', 'Credentials stored securely.', 'success');
      updateStatus('Ready to catalog', 'green');
    }

    async function captureCard() {
      if (!config.geminiApiKey) { showNotification('Missing Key', 'Configure Gemini key first.', 'error'); toggleSettings(true); return; }
      updateStatus('Processing visual...', 'yellow');
      laser.classList.remove('hidden');

      const context = canvas.getContext('2d');
      const size = Math.min(video.videoWidth, video.videoHeight);
      canvas.width = size; canvas.height = size;
      context.drawImage(video, (video.videoWidth - size)/2, (video.videoHeight - size)/2, size, size, 0, 0, size, size);
      
      try {
        const data = await callGemini(canvas.toDataURL('image/jpeg', 0.85).split(',')[1]);
        laser.classList.add('hidden');
        openPreviewModal(data);
      } catch (err) {
        laser.classList.add('hidden');
        updateStatus('Scan Failed', 'red');
        showNotification('Error', 'AI vision extraction failed.', 'error');
      }
    }

    async function callGemini(base64) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${config.geminiApiKey}`;
      const prompt = currentCardType === 'graded' ? "Find Grader, Player, year, set name, grade, cert number, and estimate sold price." : "Find Player, year, set name, card number, and estimate raw sold price.";
      const payload = {
        contents: [{ parts: [{ text: prompt + " Output clean JSON with keys: player, year, set, grade, cert, marketValue." }, { inlineData: { mimeType: "image/jpeg", data: base64 } }] }],
        generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { player: {type:"STRING"}, year: {type:"STRING"}, set: {type:"STRING"}, grade: {type:"STRING"}, cert: {type:"STRING"}, marketValue: {type:"STRING"} }, required: ["player","year","set"] } }
      };
      const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const json = await res.json();
      return JSON.parse(json.candidates[0].content.parts[0].text);
    }

    function openPreviewModal(data) {
      document.getElementById('edit-player').value = data.player || '';
      document.getElementById('edit-year').value = data.year || '';
      document.getElementById('edit-set').value = data.set || '';
      document.getElementById('edit-grade').value = data.grade || (currentCardType === 'raw' ? 'NM' : '');
      document.getElementById('edit-cert').value = data.cert || 'N/A';
      document.getElementById('edit-market').value = data.marketValue ? data.marketValue.replace(/[^0-9.]/g, '') : '0.00';
      document.getElementById('edit-price').value = document.getElementById('price-paid').value || '0.00';
      document.getElementById('preview-modal').classList.remove('opacity-0', 'pointer-events-none');
    }

    function closePreviewModal() {
      document.getElementById('preview-modal').classList.add('opacity-0', 'pointer-events-none');
      updateStatus('Ready to catalog', 'green');
    }

    async function sendToGoogleSheets() {
      updateStatus('Syncing row database...', 'yellow');
      const payload = {
        player: document.getElementById('edit-player').value, year: document.getElementById('edit-year').value,
        set: document.getElementById('edit-set').value, grade: document.getElementById('edit-grade').value,
        cert: document.getElementById('edit-cert').value, marketValue: document.getElementById('edit-market').value,
        pricePaid: document.getElementById('edit-price').value, source: document.getElementById('source').value, isRaw: currentCardType === 'raw'
      };
      closePreviewModal();
      try {
        await fetch(config.sheetAppUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        showNotification('Slab Logged!', `${payload.player} saved.`, 'success');
        updateStatus('Ready to catalog', 'green');
        document.getElementById('price-paid').value = "";
      } catch (err) {
        updateStatus('Save error', 'red');
      }
    }

    function updateStatus(msg, color) {
      statusText.innerText = msg;
      statusIndicator.className = `w-2 h-2 rounded-full ${color === 'green' ? 'bg-emerald-500 animate-pulse' : color === 'yellow' ? 'bg-amber-500 animate-ping' : color === 'blue' ? 'bg-blue-500' : 'bg-red-500'}`;
    }

    function showNotification(title, message, type) {
      const box = document.getElementById('notification');
      document.getElementById('notification-title').innerText = title;
      document.getElementById('notification-desc').innerText = message;
      document.getElementById('notification-bg').className = `border rounded-2xl p-4 shadow-2xl flex items-center space-x-3 ${type === 'success' ? 'bg-emerald-950 border-emerald-800' : type === 'error' ? 'bg-red-950 border-red-800' : 'bg-gray-900 border-gray-800'}`;
      box.classList.remove('-translate-y-24');
      setTimeout(() => box.classList.add('-translate-y-24'), 3500);
    }
  </script>
</body>
</html>
